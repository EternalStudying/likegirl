spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/likegirl?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8

mybatis:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080
